<div class="container mt-5" style="max-width:400px">
  <h3 class="text-center mb-4">Login</h3>

  <form (ngSubmit)="login()" #loginForm="ngForm">

    <div class="mb-3">
      <label>Email</label>
      <input type="email" class="form-control" [(ngModel)]="email" name="email" required email #emailInput="ngModel">
      <div *ngIf="emailInput.invalid && emailInput.touched" class="text-danger">
        Enter a valid email
      </div>
    </div>

    <div class="mb-3 position-relative">
      <label>Password</label>

      <input [type]="showPassword ? 'text' : 'password'" class="form-control pe-5" [(ngModel)]="password"
        name="password" required minlength="6" #passwordInput="ngModel">


      <span class="eye-icon" (click)="togglePassword()">
        <i class="fa" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
      </span>

      <div *ngIf="passwordInput.invalid && passwordInput.touched" class="text-danger">
        Password must be at least 6 characters
      </div>
    </div>

    <button class="btn btn-primary w-100" [disabled]="loginForm.invalid">
      Login
    </button>

    <p class="mt-3 text-center">
      Don’t have an account?
      <a routerLink="/signup">Signup</a>
    </p>
  </form>
  <button class="btn google-btn w-100 mt-3" type="button" (click)="googleLogin()">
    <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google" />
    Continue with Google
  </button>


</div>
