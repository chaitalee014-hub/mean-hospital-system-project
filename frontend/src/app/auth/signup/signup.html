<div class="container mt-5" style="max-width:400px">
  <h3 class="text-center mb-4">Signup</h3>

  <form (ngSubmit)="signup()" #signupForm="ngForm">

    <div class="mb-3">
      <label>Full Name</label>
      <input type="text" class="form-control" [(ngModel)]="name" name="name" required #nameInput="ngModel">

      <div *ngIf="nameInput.invalid && nameInput.touched" class="text-danger">
        Name is required
      </div>
    </div>

    <div class="mb-3">
      <label>Email</label>
      <input type="email" class="form-control" [(ngModel)]="email" name="email" required email #emailInput="ngModel">
      <div *ngIf="emailInput.invalid && emailInput.touched" class="text-danger">
        Enter a valid email
      </div>
    </div>

    <!-- PASSWORD -->
    <div class="mb-3 position-relative">
      <label>Password</label>

      <input [type]="showPassword ? 'text' : 'password'" class="form-control pe-5" [(ngModel)]="password"
        name="password" required minlength="6" #passwordInput="ngModel">

      <span class="eye-icon" (click)="togglePassword()">
        <i class="fa" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
      </span>

      <div *ngIf="passwordInput.invalid && passwordInput.touched" class="text-danger">
        Password must be at least 6 characters
      </div>
    </div>

    <!-- CONFIRM PASSWORD -->
    <div class="mb-3 position-relative">
      <label>Confirm Password</label>

      <input [type]="showConfirmPassword ? 'text' : 'password'" class="form-control pe-5" [(ngModel)]="confirmPassword"
        name="confirmPassword" required #confirmPasswordInput="ngModel">

      <span class="eye-icon" (click)="toggleConfirmPassword()">
        <i class="fa" [ngClass]="showConfirmPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
      </span>

      <div *ngIf="confirmPassword !== password && confirmPasswordInput.touched" class="text-danger">
        Passwords do not match
      </div>
    </div>

    <button class="btn btn-success w-100" [disabled]="signupForm.invalid || password !== confirmPassword">
      Signup
    </button>

    <p class="mt-3 text-center">
      Already have an account?
      <a routerLink="/login">Login</a>
    </p>

  </form>
</div>
